<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#B0ADA6;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',system-ui,sans-serif}
#app{width:390px;height:844px;background:#F7F6F3;border-radius:48px;overflow:hidden;position:relative;box-shadow:0 32px 80px rgba(0,0,0,.4),0 0 0 1px rgba(0,0,0,.1)}
.screen{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column;background:#F7F6F3;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform}
.screen.hidden-right{transform:translateX(100%)}
.screen.hidden-left{transform:translateX(-100%)}
.screen.hidden-bottom{transform:translateY(100%)}
.scroll{overflow-y:auto;flex:1}
.scroll::-webkit-scrollbar{display:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}

/* STATUS BAR */
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 0;flex-shrink:0}
.status .time{font-size:15px;font-weight:600}

/* BOTTOM NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:1px solid #EBEBEB;display:flex;align-items:center;justify-content:space-around;padding:10px 0 24px;z-index:20}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#8A8A8A;font-weight:400}
.nav-btn.active{color:#1B6B3A;font-weight:600}
.nav-fab{width:48px;height:48px;background:#111;border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.22);margin-top:-4px}

/* CARDS */
.post-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:14px}
.post-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.tag{font-size:11px;font-weight:500;background:#EAF4EE;color:#1B6B3A;padding:3px 10px;border-radius:100px;display:inline-block}
.pill{padding:6px 16px;border-radius:100px;font-size:13px;font-weight:500;border:1.5px solid #EBEBEB;background:#fff;color:#8A8A8A;cursor:pointer;flex-shrink:0}
.pill.active{background:#111;color:#fff;border-color:#111}
.pill.green.active{background:#EAF4EE;color:#1B6B3A;border-color:#1B6B3A}

/* FORM ELEMENTS */
.field-label{font-size:12px;font-weight:600;color:#8A8A8A;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;display:block}
.field-input{width:100%;background:#fff;border:1.5px solid #EBEBEB;border-radius:12px;padding:13px 16px;font-size:14px;color:#111;display:block;transition:border-color .15s;resize:none;line-height:1.5}
.field-input:focus{border-color:#1B6B3A}
.field-input::placeholder{color:#C0C0C0}
.field-group{margin-bottom:20px}
.auto-field{background:#F7F6F3;border:1.5px solid #EBEBEB;border-radius:12px;padding:13px 16px;font-size:14px;color:#8A8A8A;display:flex;justify-content:space-between;align-items:center}
.skill-pill{padding:7px 16px;border-radius:100px;border:1.5px solid #EBEBEB;background:#fff;color:#6B6B6B;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.skill-pill.on{border-color:#1B6B3A;background:#EAF4EE;color:#1B6B3A}
.radio-btn{padding:8px 18px;border-radius:100px;border:1.5px solid #EBEBEB;background:#fff;color:#6B6B6B;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.radio-btn.on{border-color:#111;background:#111;color:#fff}
.divider-label{display:flex;align-items:center;gap:12px;margin:4px 0 20px}
.divider-label::before,.divider-label::after{content:'';flex:1;height:1px;background:#EBEBEB}
.divider-label span{font-size:11px;font-weight:600;color:#C0C0C0;text-transform:uppercase;letter-spacing:.8px}
.upload-box{width:100%;height:88px;border:1.5px dashed #DDD;border-radius:12px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.upload-label{font-size:13px;color:#C0C0C0;font-weight:500}
.type-card{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;background:#fff;border:1.5px solid #EBEBEB;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .18s;cursor:pointer;text-align:left;width:100%}
.type-card.active{border-width:2px}
.type-icon-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s}
.type-card-label{font-size:13px;font-weight:600;line-height:1.2}
.type-card-desc{font-size:11px;color:#ABABAB;margin-top:2px}

/* ONBOARDING */

.ob-scroll{flex:1;overflow-y:auto;padding:0 24px}
.ob-scroll::-webkit-scrollbar{display:none}
.ob-footer{padding:16px 24px 40px;flex-shrink:0;background:#F7F6F3}
.ob-btn{width:100%;padding:16px;background:#111;color:#fff;font-size:15px;font-weight:600;border-radius:14px;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s}
.ob-btn:active{opacity:.82}
.ob-btn.secondary{background:#F0F0F0;color:#111;margin-top:10px}

.ob-field{margin-bottom:18px}
.ob-label{font-size:12px;font-weight:600;color:#8A8A8A;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;display:block}

.ob-input:focus{border-color:#1B6B3A}
.ob-input::placeholder{color:#C8C8C8}
.ob-select{width:100%;background:#fff;border:1.5px solid #EBEBEB;border-radius:12px;padding:14px 16px;font-size:15px;color:#111;outline:none;font-family:inherit;appearance:none;cursor:pointer}
.ob-skill{padding:9px 18px;border-radius:100px;border:1.5px solid #EBEBEB;background:#fff;color:#6B6B6B;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.ob-skill.on{border-color:#1B6B3A;background:#EAF4EE;color:#1B6B3A}
.ob-avail{display:flex;align-items:center;gap:14px;padding:16px;background:#fff;border:1.5px solid #EBEBEB;border-radius:14px;cursor:pointer;transition:all .15s;width:100%;text-align:left;font-family:inherit;margin-bottom:12px}
.ob-avail.on{border-color:#111;background:#111}
.ob-avail.on .ob-avail-title{color:#fff}
.ob-avail.on .ob-avail-sub{color:rgba(255,255,255,.6)}
.ob-avail-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ob-avail-title{font-size:15px;font-weight:600;color:#111}
.ob-avail-sub{font-size:12px;color:#8A8A8A;margin-top:2px}
@keyframes slideInRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.ob-animate{animation:slideInRight .28s ease forwards}
@keyframes floatUp{0%{transform:translateY(0)}50%{transform:translateY(-8px)}100%{transform:translateY(0)}}
.ob-float{animation:floatUp 3s ease-in-out infinite}

/* SHEETS & MODALS */
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .28s ease;pointer-events:none}
.sheet-backdrop.open{opacity:1;pointer-events:all}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;padding:0 0 32px;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.sheet-backdrop.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#E0E0E0;border-radius:100px;margin:12px auto 16px}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:0 24px;opacity:0;transition:opacity .22s ease;pointer-events:none}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px;width:100%;transform:scale(.92);opacity:0;transition:transform .25s cubic-bezier(.4,0,.2,1),opacity .25s ease}
.modal-backdrop.open .modal{transform:scale(1);opacity:1}

/* MESSAGES */
.msg-row{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid #F2F2F2;cursor:pointer;transition:background .1s}
.msg-row:active{background:#F7F6F3}
.msg-ava{position:relative;flex-shrink:0}
.msg-ava img{width:48px;height:48px;border-radius:50%;object-fit:cover;display:block}
.msg-dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;background:#1B6B3A;border-radius:50%;border:2.5px solid #fff}
.msg-unread-badge{min-width:18px;height:18px;background:#1B6B3A;color:#fff;border-radius:100px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 5px}
.chat-bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.45;margin-bottom:4px}

/* ANIMATIONS */

var supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── AUTH ──────────────────────────────────────────────────────
async function supaSignUp(email, password) {
  var { data, error } = await supa.auth.signUp({ email, password });
  if (error) throw error;
  return data;
}

async function supaLogIn(email, password) {
  var { data, error } = await supa.auth.signInWithPassword({ email, password });
  if (error) throw error;
  return data;
}

async function supaLogOut() {
  await supa.auth.signOut();
  onboardData = { name:'', email:'', password:'', school:'', major:'', gradYear:'', skills:[], availability:'', avatar:null, bio:'', userId:null };
  myPosts = [];
}

// ── PROFILES ──────────────────────────────────────────────────
async function supaCreateProfile(userId, profile) {
  var { error } = await supa.from('profiles').upsert({
    id: userId,
    name: profile.name || '',
    email: profile.email || '',
    school: profile.school || '',
    major: profile.major || '',
    grad_year: profile.gradYear || '',
    skills: Array.isArray(profile.skills) ? profile.skills.join(',') : '',
    availability: profile.availability || '',
    avatar_url: profile.avatar || '',
    bio: profile.bio || '',
    created_at: new Date().toISOString(),
  });
  if (error) console.warn('createProfile:', error.message);
}

async function supaLoadProfile(userId) {
  var { data, error } = await supa.from('profiles').select('*').eq('id', userId).single();
  if (error) return null;
  return data;
}

async function supaUpdateProfile(userId, profile) {
  var { error } = await supa.from('profiles').upsert({
    id: userId,
    name: profile.name || '',
    email: profile.email || '',
    school: profile.school || '',
    major: profile.major || '',
    grad_year: profile.gradYear || '',
    skills: Array.isArray(profile.skills) ? profile.skills.join(',') : '',
    availability: profile.availability || '',
    avatar_url: profile.avatar || '',
    bio: profile.bio || '',
  });
  if (error) throw error;
}

function applyProfile(profile) {
  onboardData.name        = profile.name        || '';
  onboardData.email       = profile.email       || '';
  onboardData.school      = profile.school      || '';
  onboardData.major       = profile.major       || '';
  onboardData.gradYear    = profile.grad_year   || '';
  onboardData.skills      = profile.skills ? profile.skills.split(',').filter(Boolean) : [];
  onboardData.availability= profile.availability|| '';
  onboardData.avatar      = profile.avatar_url  || null;
  onboardData.bio         = profile.bio         || '';
}

// ── POSTS ─────────────────────────────────────────────────────
async function supaFetchFeedPosts() {
  // Try joined query first
  var { data, error } = await supa
    .from('posts')
    .select('*, profiles(name, school, avatar_url, grad_year)')
    .order('created_at', { ascending: false })
    .limit(20);

  if (error) {
    console.warn('fetchFeed joined query failed:', error.message, '— trying simple query');
    // Fallback: fetch posts without join
    var { data: data2, error: error2 } = await supa
      .from('posts')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(20);
    if (error2) { console.warn('fetchFeed fallback failed:', error2.message); return []; }
    return data2 || [];
  }
  return data || [];
}

async function supaFetchMyPosts(userId) {
  var { data, error } = await supa
    .from('posts')
    .select('*')
    .eq('user_id', userId)
    .order('created_at', { ascending: false });
  if (error) { console.warn('fetchMyPosts:', error.message); return []; }
  return data || [];
}

async function supaInsertPost(userId, postData) {
  var { data, error } = await supa.from('posts').insert({
    user_id:      userId,
    type:         postData.type     || 'skills',
    type_label:   postData.typeLabel|| 'My Skills',
    caption:      postData.caption  || '',
    tags:         Array.isArray(postData.tags) ? postData.tags.join(',') : '',
    image_url:    postData.imageUrl || '',
    created_at:   new Date().toISOString(),
  }).select().single();
  if (error) { console.warn('insertPost:', error.message); return null; }
  return data;
}

async function supaDeletePost(postId) {
  var { error } = await supa.from('posts').delete().eq('id', postId);
  if (error) console.warn('deletePost:', error.message);
}

async function supaToggleLike(postId, userId, currentlyLiked) {
  if (currentlyLiked) {
    await supa.from('post_likes').delete().eq('post_id', postId).eq('user_id', userId);
    await supa.from('posts').update({ likes: supa.rpc ? undefined : 0 }).eq('id', postId);
    // Use RPC decrement if available, else just refetch
  } else {
    await supa.from('post_likes').upsert({ post_id: postId, user_id: userId });
  }
}

// ── NORMALISE a Supabase post row → UI post object ────────────
function normalizePost(row) {
  var profile = row.profiles || {};
  var gradYear = profile.grad_year || '';
  var schoolStr = (profile.school || row.school || '');
  if(gradYear) schoolStr += " · '" + gradYear.slice(2);
  return {
    id:       row.id,
    img:      row.image_url || 'https://images.unsplash.com/photo-1588690154757-badf4644190f?w=800&q=80',
    avatar:   profile.avatar_url || row.avatar_url || (row.user_id === onboardData.userId ? myAva() : MY_AVA),
    name:     profile.name   || row.name  || (row.user_id === onboardData.userId ? myName() : 'Student'),
    school:   schoolStr      || (row.user_id === onboardData.userId ? mySchool()+myGradYear() : ''),
    caption:  row.caption    || '',
    tags:     row.tags ? row.tags.split(',').filter(Boolean) : [],
    likes:    row.likes      || 0,
    comments: row.comment_count || row.comments || 0,
    type:     row.type_label || row.type || 'Post',
    userId:   row.user_id,
  };
}

// ── SESSION CHECK (auto-login on app open) ────────────────────
async function supaCheckSession() {
  try {
    var { data } = await supa.auth.getSession();
    if (data && data.session && data.session.user) {
      var uid = data.session.user.id;
      onboardData.userId = uid;
      onboardData.email  = data.session.user.email;
      var profile = await supaLoadProfile(uid);
      if (profile) {
        applyProfile(profile);
        // Load user's own posts
        var rows = await supaFetchMyPosts(uid);
        myPosts = rows.map(normalizePost);
      }
      go('home');
    }
  } catch(e) { console.warn('session check:', e.message); }
}


// ── TOAST HELPER ─────────────────────────────────────────────
function toast(msg, type) {
  var t = document.createElement('div');
  var isErr = type === 'error';
  t.textContent = msg;
  t.style.cssText = [
    'position:fixed','bottom:110px','left:50%','transform:translateX(-50%)',
    'background:'+(isErr?'#E53E3E':'#1B6B3A'),
    'color:#fff','padding:12px 20px','border-radius:12px',
    'font-size:13px','font-weight:500','z-index:9999',
    'max-width:320px','text-align:center',
    'box-shadow:0 4px 16px rgba(0,0,0,.2)',
    'transition:opacity .3s','font-family:inherit'
  ].join(';');
  document.body.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; setTimeout(function(){ t.remove(); }, 300); }, 3500);
}

function el(tag, attrs, ...kids) {
  var e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(function([k, v]) {
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  });
  kids.forEach(function(k) {
    if (k == null) return;
    if (typeof k === 'string') e.appendChild(document.createTextNode(k));
    else e.appendChild(k);
  });
  return e;
}
function svg(tag, attrs, html) {
  var e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) Object.entries(attrs).forEach(function([k, v]) { e.setAttribute(k, v); });
  if (html) e.innerHTML = html;
  return e;
}
function icon(paths, w, stroke) {
  var s = svg('svg', {viewBox:'0 0 24 24', width: w||22, height: w||22, fill:'none', stroke: stroke||'currentColor', 'stroke-width':'1.8', 'stroke-linecap':'round', 'stroke-linejoin':'round'});
  s.innerHTML = paths;
  return s;
}

// ── ROUTER ────────────────────────────────────────────────────
var state = { screen: 'welcome', nav: 'home', post: null };

function go(screen, post) {
  if (post) state.post = post;
  if (screen === 'home' || screen === 'explore') state.nav = screen;
  if (screen === 'myprofile') state.nav = 'me';
  if (screen === 'messages') state.nav = 'messages';
  state.screen = screen;
  render();
}

// ── STATUS BAR ────────────────────────────────────────────────
function StatusBar(light) {
  var c = light ? '#fff' : '#111';
  return el('div', {class:'status'},
    el('span', {class:'time', style:{color:c}}, '9:41'),
    el('div', {style:{display:'flex',gap:'5px',alignItems:'center'}},
      el('svg', {viewBox:'0 0 15 11', width:'15', height:'11', style:{display:'block'}},
        ...[{x:0,y:5,h:6},{x:3.5,y:3,h:8},{x:7,y:1,h:10},{x:10.5,y:0,h:11}].map(function(r){
          var rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
          rect.setAttribute('x',r.x); rect.setAttribute('y',r.y);
          rect.setAttribute('width','2.5'); rect.setAttribute('height',r.h);
          rect.setAttribute('rx','.5'); rect.setAttribute('fill',c);
          return rect;
        })
      ),
      (function(){
        var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
        s.setAttribute('viewBox','0 0 22 11'); s.setAttribute('width','22'); s.setAttribute('height','11');
        s.innerHTML = '<rect x=".5" y=".5" width="18" height="10" rx="2" stroke="'+c+'" stroke-width="1" fill="none"/><rect x="2" y="2" width="11" height="7" rx="1" fill="'+c+'"/><path d="M20 3.5v4" stroke="'+c+'" stroke-width="1.5" stroke-linecap="round"/>';
        return s;
      })()
    )
  );
}

// ── BOTTOM NAV ────────────────────────────────────────────────
function BottomNav() {
  var items = [
    {key:'home', label:'Home', paths:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'},
    {key:'explore', label:'Explore', paths:'<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>'},
    null,
    {key:'messages', label:'Messages', paths:'<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/>'},
    {key:'me', label:'Me', avatar:true},
  ];
  var nav = el('div', {class:'bottom-nav'});
  items.forEach(function(item) {
    if (!item) {
      var fab = el('button', {class:'nav-fab', onclick:function(){go('create');}});
      fab.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
      nav.appendChild(fab);
      return;
    }
    var active = state.nav === item.key;
    var c = active ? '#1B6B3A' : '#8A8A8A';
    var btn = el('button', {class:'nav-btn'+(active?' active':''), onclick:function(){
      if(item.key==='home') go('home');
      else if(item.key==='explore') go('explore');
      else if(item.key==='messages') go('messages');
      else if(item.key==='me') go('myprofile');
    }});

    // Me tab — show real avatar if signed up, otherwise generic icon
    if(item.avatar) {
      var avaEl = el('div', {style:{width:'24px',height:'24px',borderRadius:'50%',overflow:'hidden',border:'2px solid '+(active?'#1B6B3A':'#C0C0C0'),flexShrink:'0'}});
      avaEl.appendChild(el('img',{src:myAva(),style:{width:'100%',height:'100%',objectFit:'cover'}}));
      btn.appendChild(avaEl);
    } else {
      var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
      s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('width','22'); s.setAttribute('height','22');
      s.setAttribute('fill','none'); s.setAttribute('stroke',c);
      s.setAttribute('stroke-width','1.8'); s.setAttribute('stroke-linecap','round'); s.setAttribute('stroke-linejoin','round');
      s.innerHTML = item.paths;
      btn.appendChild(s);
    }
    btn.appendChild(document.createTextNode(item.label));
    nav.appendChild(btn);
  });
  return nav;
}

  function renderCard(post) {

    imgWrap.appendChild(fullBtn);
    card.appendChild(imgWrap);

    var body = el('div', {style:{padding:'14px 16px'}});
    var author = el('div', {style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}});

    body.appendChild(author);
    body.appendChild(el('p', {style:{fontSize:'13px',color:'#111',lineHeight:'1.55',marginBottom:'10px'}}, post.caption));

    var tags = el('div', {style:{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'12px'}});

    body.appendChild(tags);

    var acts = el('div', {style:{display:'flex',alignItems:'center',gap:'14px'}});
    var likeCount = post.likes; var liked = false;
    var likeBtn = el('button', {style:{display:'flex',alignItems:'center',gap:'5px'}});
    var likeIco = el('span');
    var likeNum = el('span', {style:{fontSize:'12px',color:'#8A8A8A'}}, String(likeCount));

    setLikeUI(false);
    likeBtn.appendChild(likeIco); likeBtn.appendChild(likeNum);
    likeBtn.addEventListener('click', function(){

    var cmtBtn = el('button', {style:{display:'flex',alignItems:'center',gap:'5px'}, onclick:function(){go('postdetail',post);}});
    cmtBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#8A8A8A" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

    acts.appendChild(cmtBtn);

    body.appendChild(acts);
    card.appendChild(body);
    return card;

    feed.innerHTML = '';

    emp.appendChild(el('span',{style:{fontSize:'48px',marginBottom:'16px'}},'🌿'));

    emp.appendChild(btn);
    feed.appendChild(emp);

  // Load posts from Supabase
  async function loadFeed() {
    showLoading();
    try {
      var rows = await supaFetchFeedPosts();
      console.log('Feed rows from Supabase:', rows.length, rows);
      feed.innerHTML = '';
      if(!rows.length){ showEmpty(); return; }
      rows.forEach(function(row){ feed.appendChild(renderCard(normalizePost(row))); });

      console.warn('loadFeed error:', e.message);
      feed.innerHTML = '';

      var errDiv = el('div',{style:{padding:'20px',textAlign:'center',color:'#8A8A8A',fontSize:'13px'}});

function CreateScreen() {
  var currentType='skills';
  var done=false;

  var wrap=el('div',{style:{display:'flex',flexDirection:'column',height:'100%',background:'#F7F6F3'}});
  wrap.appendChild(StatusBar());

  // Header
  var hdr=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'10px 20px 14px',flexShrink:'0'}});

  backBtn.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
  hdr.appendChild(backBtn);
  hdr.appendChild(el('span',{style:{fontSize:'18px',fontWeight:'600',color:'#111',letterSpacing:'-.3px'}},'Post to The Yard'));
  wrap.appendChild(hdr);

  // Type grid
  var typeGrid=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',padding:'0 20px 14px',flexShrink:'0'}});
  var typeIcons={
    skills:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
    project:'<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>',
    collab:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
    event:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  };
  var typeCards={};
  C_TYPES.forEach(function(cfg){
    var card=el('button',{class:'type-card',onclick:function(){selectType(cfg.key);}});
    var iconWrap=el('div',{class:'type-icon-wrap',style:{background:cfg.bg}});
    iconWrap.innerHTML='<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="'+cfg.color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+typeIcons[cfg.key]+'</svg>';
    card.appendChild(iconWrap);
    var textDiv=el('div');
    textDiv.appendChild(el('p',{class:'type-card-label',style:{color:'#111'}},cfg.label));
    textDiv.appendChild(el('p',{class:'type-card-desc'},cfg.desc));
    card.appendChild(textDiv);
    typeGrid.appendChild(card);
    typeCards[cfg.key]=card;
  });
  wrap.appendChild(typeGrid);
  wrap.appendChild(el('div',{style:{height:'1px',background:'#EBEBEB',flexShrink:'0'}}));

  // Form area
  var formArea=el('div',{class:'scroll',style:{padding:'20px 20px 0'}});
  wrap.appendChild(formArea);

  // Submit bar
  var submitBar=el('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',padding:'12px 20px 32px',background:'rgba(247,246,243,.97)',backdropFilter:'blur(12px)',borderTop:'1px solid #EBEBEB'}});
  var submitBtn=el('button',{style:{width:'100%',padding:'16px',background:'#111',color:'#fff',fontSize:'15px',fontWeight:'600',borderRadius:'14px',border:'none',cursor:'pointer',fontFamily:'inherit'}});
  submitBtn.textContent='Post to The Yard';
  submitBtn.addEventListener('click', async function(){
    var typeLabels={skills:'My Skills',project:'Project',collab:'Collab',event:'Event'};
    var typeColors={skills:'#1B6B3A',project:'#0A5A8A',collab:'#7A3FC0',event:'#B85C00'};
    submitBtn.textContent='Posting...'; submitBtn.style.opacity='0.7'; submitBtn.disabled=true;

    // Read caption and tags from whatever inputs are currently in the form
    var captionEl = formArea.querySelector('textarea') || formArea.querySelector('input[type="text"]');
    var titleEl   = formArea.querySelector('input[type="text"]');
    var caption   = (captionEl ? captionEl.value.trim() : '') || '';
    var title     = (titleEl   ? titleEl.value.trim()   : '') || '';
    var fullCaption = title ? (title + (caption && caption !== title ? ' — ' + caption : '')) : caption;

    // Read selected skill pills as tags
    var tags = [];
    formArea.querySelectorAll('.skill-pill.on').forEach(function(p){ tags.push(p.textContent.trim()); });

    var localPost = {
      id: 'local_' + Date.now(),
      type: currentType,
      typeLabel: typeLabels[currentType]||currentType,
      typeColor: typeColors[currentType]||'#111',
      name: myName(), school: mySchool()+myGradYear(),
      avatar: myAva(), time: 'Just now', likes: 0, comments: 0, liked: false,
      img: 'https://images.unsplash.com/photo-1588690154757-badf4644190f?w=800&q=80',
      caption: fullCaption || (typeLabels[currentType]+' post'),
      tags: tags,
    };

    // Check session fresh in case userId wasn't set yet
    if(!onboardData.userId) {
      try {
        var { data: sess } = await supa.auth.getSession();
        if(sess && sess.session) onboardData.userId = sess.session.user.id;
      } catch(e){}
    }

    try {
      if(onboardData.userId) {
        var inserted = await supaInsertPost(onboardData.userId, {
          type: currentType,
          typeLabel: typeLabels[currentType]||currentType,
          caption: fullCaption || (typeLabels[currentType]+' post'),
          tags: tags,
        });
        if(inserted) {
          localPost.id = inserted.id;
          toast('Post saved ✅');
          console.log('✅ Post saved to Supabase:', inserted.id);
        } else {
          toast('Insert returned nothing — check Supabase RLS', 'error');
        }
      } else {
        toast('Not logged in — post not saved to database', 'error');
        console.warn('No userId — post saved locally only');
      }
    } catch(e) {
      toast('Post failed: ' + e.message, 'error');
      console.error('insertPost error:', e);
    }

    myPosts.unshift(localPost);
    submitBtn.textContent='Post to The Yard'; submitBtn.style.opacity='1'; submitBtn.disabled=false;
    showSuccess();
  });
  submitBar.appendChild(submitBtn);
  wrap.appendChild(submitBar);

  function makeLabel(text){
    var s=el('span',{class:'field-label'},text);
    return s;
  }
  function makeInput(ph,multi,rows){
    if(multi){var t=el('textarea',{class:'field-input',placeholder:ph,rows:rows||3});t.addEventListener('focus',function(){t.style.borderColor='#1B6B3A';});t.addEventListener('blur',function(){t.style.borderColor='#EBEBEB';});return t;}
    var i=el('input',{class:'field-input',type:'text',placeholder:ph});i.addEventListener('focus',function(){i.style.borderColor='#1B6B3A';});i.addEventListener('blur',function(){i.style.borderColor='#EBEBEB';});return i;
  }
  function fg(label,child){var d=el('div',{class:'field-group'});d.appendChild(makeLabel(label));d.appendChild(child);return d;}
  function autoField(){var d=el('div',{class:'auto-field'});d.appendChild(el('span',null,mySchool()+myGradYear()));d.appendChild(el('span',{style:{fontSize:'11px',color:'#C0C0C0',fontWeight:'500'}},'Auto-filled'));return d;}
  function skillPills(){
    var d=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px'}});
    SKILLS.forEach(function(s){
      var b=el('button',{class:'skill-pill'},s);
      b.addEventListener('click',function(){b.classList.toggle('on');});
      d.appendChild(b);
    });
    return d;
  }
  function radioGroup(options){
    var d=el('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
    options.forEach(function(o,i){
      var b=el('button',{class:'radio-btn'+(i===0?' on':'')},o);
      b.addEventListener('click',function(){d.querySelectorAll('.radio-btn').forEach(function(x){x.classList.remove('on');});b.classList.add('on');});
      d.appendChild(b);
    });
    return d;
  }
  function divLine(label){var d=el('div',{class:'divider-label'});d.appendChild(el('span',null,label));return d;}
  function uploadBox(hint){var b=el('button',{class:'upload-box'});b.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#C8C8C8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="#C8C8C8" stroke="none"/><polyline points="21 15 16 10 5 21"/></svg>';b.appendChild(el('span',{class:'upload-label'},hint||'Upload images'));return b;}

  function buildForm(type){
    var d=el('div',{class:'fade-up'});
    if(type==='skills'){
      d.appendChild(divLine('Talent Post'));
      d.appendChild(fg('Title',makeInput('"Graphic Designer Open for Paid Work"')));
      d.appendChild(fg('Bio / About You',makeInput("Describe what you do and the work you're looking for...",true,3)));
      d.appendChild(fg('Your Skills',skillPills()));
      d.appendChild(fg('Portfolio Images',uploadBox('Add up to 6 images of your work')));
      d.appendChild(fg('School',autoField()));
      d.appendChild(fg('Collaboration Interests',makeInput('What kinds of projects do you want to join? (optional)',true,2)));
      d.appendChild(fg('Availability Status',radioGroup(['Open to Collabs','Open to Paid Work','Both'])));
    } else if(type==='project'){
      d.appendChild(divLine('Project Post'));
      d.appendChild(fg('Project Title',makeInput('"Campus Crypto Payment App"')));
      d.appendChild(fg('Project Description',makeInput('What are you building? What help do you need?',true,4)));
      d.appendChild(fg('Skills Needed',skillPills()));
      d.appendChild(fg('Roles Needed',makeInput('"2 designers, 1 developer" (optional)')));
      d.appendChild(fg('Project Images',uploadBox('Screenshots, mockups, or references')));
      d.appendChild(fg('School',autoField()));
      d.appendChild(fg('Compensation',radioGroup(['Paid','Unpaid','Equity / Startup'])));
      d.appendChild(fg('Deadline',makeInput('e.g. Rolling, March 15, ASAP (optional)')));
    } else if(type==='collab'){
      d.appendChild(divLine('Collab Post'));
      var tip=el('div',{style:{background:'#EAF4EE',borderRadius:'12px',padding:'12px 14px',marginBottom:'20px'}});
      tip.appendChild(el('p',{style:{fontSize:'13px',color:'#1B6B3A',lineHeight:'1.55'}},'💡 Collabs are open ideas. Just a spark and people to build with.'));
      d.appendChild(tip);
      d.appendChild(fg('Collab Title',makeInput('"Let\'s Build a Black Business Directory"')));
      d.appendChild(fg('The Idea',makeInput('Describe the idea. What would you build together?',true,4)));
      d.appendChild(fg('Skills That Would Help',skillPills()));
      d.appendChild(fg('School',autoField()));
      d.appendChild(fg('Inspiration Images',uploadBox('Mood boards, references, anything that captures the vibe')));
      d.appendChild(fg('Team Size Goal',makeInput('"3–5 people" (optional)')));
    } else {
      d.appendChild(divLine('Event Post'));
      d.appendChild(fg('Event Title',makeInput('"AUC Startup Pitch Night"')));
      d.appendChild(fg('Description',makeInput("What's happening? Who should come?",true,3)));
      d.appendChild(fg('Location',makeInput('Address or virtual link')));
      var dateRow=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'20px'}});
      var dateFg=el('div');dateFg.appendChild(makeLabel('Date'));var dateIn=el('input',{type:'date',class:'field-input'});dateFg.appendChild(dateIn);
      var timeFg=el('div');timeFg.appendChild(makeLabel('Time'));var timeIn=el('input',{type:'time',class:'field-input'});timeFg.appendChild(timeIn);
      dateRow.appendChild(dateFg);dateRow.appendChild(timeFg);
      d.appendChild(dateRow);
      d.appendChild(fg('School',autoField()));
      d.appendChild(fg('Flyer / Event Image',uploadBox('Upload your event flyer or a photo')));
    }
    d.appendChild(el('div',{style:{height:'90px'}}));
    return d;
  }

  function selectType(key){
    currentType=key;
    C_TYPES.forEach(function(cfg){
      var card=typeCards[cfg.key];
      var active=cfg.key===key;
      card.style.background=active?cfg.bg:'#fff';
      card.style.border=(active?'2px':'1.5px')+' solid '+(active?cfg.color:'#EBEBEB');
      card.querySelector('.type-card-label').style.color=active?cfg.color:'#111';
      card.querySelector('.type-icon-wrap').style.background=active?cfg.color:cfg.bg;
      card.querySelector('svg').setAttribute('stroke',active?'#fff':cfg.color);
    });
    formArea.innerHTML='';
    formArea.scrollTop=0;
    if(!done) formArea.appendChild(buildForm(key));
  }

  function showSuccess(){
    var msgs={skills:{emoji:'🎯',title:'Your skills are live!',sub:'Students can now discover you and reach out.'},project:{emoji:'🚀',title:'Project posted!',sub:'The right people will find you.'},collab:{emoji:'🤝',title:"Collab is out there!",sub:"Your idea is on The Yard. Let's see who shows up."},event:{emoji:'🎉',title:'Event is posted!',sub:'Students can now discover your event.'}};
    var m=msgs[currentType];
    done=true;

// ── GLOBAL OVERLAY HELPERS ────────────────────────────────────
var activeOverlay = null;
function closeOverlay(){
  if(activeOverlay){ activeOverlay.classList.remove('open'); setTimeout(function(){if(activeOverlay&&activeOverlay.parentNode)activeOverlay.parentNode.removeChild(activeOverlay);activeOverlay=null;},320); }
}
function openOverlay(node){
  closeOverlay();
  var app=document.getElementById('app');
  app.appendChild(node);
  activeOverlay=node;
  setTimeout(function(){node.classList.add('open');},10);
}

function showShareSheet(name){
  var backdrop=el('div',{class:'sheet-backdrop'});
  backdrop.addEventListener('click',function(e){if(e.target===backdrop)closeOverlay();});
  var sheet=el('div',{class:'sheet'});
  sheet.appendChild(el('div',{class:'sheet-handle'}));
  var title=el('p',{style:{fontSize:'16px',fontWeight:'600',color:'#111',textAlign:'center',marginBottom:'6px',paddingTop:'4px'}},name?'Share '+name+"'s Profile":'Share Profile');
  sheet.appendChild(title);
  sheet.appendChild(el('p',{style:{fontSize:'13px',color:'#8A8A8A',textAlign:'center',marginBottom:'20px',padding:'0 20px'}},'Let others know about this person on The Yard'));

  // Share options grid
  var opts=[
    {icon:'📋',label:'Copy Link'},
    {icon:'💬',label:'Send Message'},
    {icon:'📸',label:'Instagram'},
    {icon:'🐦',label:'X / Twitter'},
    {icon:'💼',label:'LinkedIn'},
    {icon:'📧',label:'Email'},
  ];
  var grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',padding:'0 20px 20px'}});
  opts.forEach(function(o){
    var btn=el('button',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'8px',padding:'16px 10px',background:'#F7F6F3',borderRadius:'14px',border:'1.5px solid #EBEBEB',width:'100%'}});
    btn.appendChild(el('span',{style:{fontSize:'24px'}},o.icon));
    btn.appendChild(el('span',{style:{fontSize:'12px',fontWeight:'500',color:'#111'}},o.label));
    btn.addEventListener('click',function(){
      if(o.label==='Copy Link'){btn.querySelector('span:last-child').textContent='Copied!';btn.style.borderColor='#1B6B3A';setTimeout(function(){btn.querySelector('span:last-child').textContent='Copy Link';btn.style.borderColor='#EBEBEB';},1500);}
      else closeOverlay();
    });
    grid.appendChild(btn);
  });
  sheet.appendChild(grid);

  // Cancel
  var cancel=el('button',{style:{width:'calc(100% - 40px)',margin:'0 20px',padding:'15px',background:'#F7F6F3',borderRadius:'14px',fontSize:'15px',fontWeight:'600',color:'#111',border:'none',cursor:'pointer'},onclick:closeOverlay},'Cancel');
  sheet.appendChild(cancel);
  backdrop.appendChild(sheet);
  openOverlay(backdrop);
}

  hdr.appendChild(moreBtn);
  wrap.appendChild(hdr);

  // Messages
  var msgArea=el('div',{class:'scroll',style:{padding:'16px',display:'flex',flexDirection:'column',gap:'2px',paddingBottom:'90px'}});

  function renderMessages(){
    msgArea.innerHTML='';
    var lastTime='';
    messages.forEach(function(m){
      if(m.time&&m.time!==lastTime){
        lastTime=m.time;
        msgArea.appendChild(el('p',{class:'chat-time'},m.time));
      }
      var row=el('div',{style:{display:'flex',alignItems:'flex-end',gap:'8px',marginBottom:'2px',justifyContent:m.me?'flex-end':'flex-start'}});
      if(!m.me){
        row.appendChild(el('img',{src:convo.avatar,style:{width:'26px',height:'26px',borderRadius:'50%',objectFit:'cover',flexShrink:'0',marginBottom:'2px'}}));
      }
      row.appendChild(el('div',{class:'chat-bubble '+(m.me?'me':'them')},m.text));
      msgArea.appendChild(row);
    });
    msgArea.scrollTop=msgArea.scrollHeight;
  }
  renderMessages();
  wrap.appendChild(msgArea);

  // Input bar
  var inputBar=el('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',padding:'10px 16px 24px',background:'#fff',borderTop:'1px solid #EBEBEB'}});

  attachBtn.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#8A8A8A" stroke-width="1.8" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>';

  var sendBtn2=el('button',{style:{display:'none',width:'28px',height:'28px',background:'#111',borderRadius:'50%',alignItems:'center',justifyContent:'center',flexShrink:'0',marginRight:'-4px'}});

  chatIn.addEventListener('input',function(){sendBtn2.style.display=chatIn.value.trim()?'flex':'none';});
  function sendMsg(){
    var txt=chatIn.value.trim();
    if(!txt)return;
    messages.push({me:true,text:txt,time:null});
    chatIn.value='';sendBtn2.style.display='none';
    renderMessages();
    // Auto-reply
    setTimeout(function(){
      var replies=["That's great! 🙌","Love that idea","Let's make it happen 💪","Send me the details","I'm in! 🔥"];
      messages.push({me:false,text:replies[Math.floor(Math.random()*replies.length)],time:null});
      renderMessages();
    },1200);
  }
  sendBtn2.addEventListener('click',sendMsg);
  chatIn.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});

  inputRow.appendChild(inputWrap2);

// ── PROGRESS BAR HELPER ───────────────────────────────────────
function ObHeader(step, total, onBack){
  var wrap = el('div',null);
  // Back + step count
  var topRow = el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 24px 0'}});
  var backBtn = el('button',{style:{width:'36px',height:'36px',display:'flex',alignItems:'center',justifyContent:'center'},onclick:onBack||function(){go('welcome');}});
  backBtn.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
  topRow.appendChild(backBtn);
  topRow.appendChild(el('span',{style:{fontSize:'13px',color:'#8A8A8A',fontWeight:'500'}},step+' of '+total));
  topRow.appendChild(el('div',{style:{width:'36px'}}));
  wrap.appendChild(topRow);
  // Progress dots
  var dots = el('div',{class:'ob-progress'});
  for(var i=1;i<=total;i++){
    var dot = el('div',{class:'ob-progress-dot'+(i<step?' done':i===step?' active':'')});
    dots.appendChild(dot);
  }
  wrap.appendChild(dots);
  return wrap;
}

      else onboardData.skills=onboardData.skills.filter(function(x){return x!==s;});
      counter.textContent=onboardData.skills.length+' selected';
    });
    pillWrap.appendChild(b);
  });
  scroll.appendChild(counter);
  scroll.appendChild(pillWrap);
  scroll.appendChild(el('div',{style:{height:'20px'}}));
  wrap.appendChild(scroll);

  var footer=el('div',{class:'ob-footer'});
  var nextBtn=el('button',{class:'ob-btn',onclick:function(){
    if(onboardData.skills.length<3){counter.style.color='#E53E3E';counter.textContent='Pick at least 3 skills';return;}
    go('ob-availability');
  }});

  wrap.appendChild(footer);

}

  buildList();
  wrap.appendChild(BottomNav());
  return wrap;
}

  // Forgot password
  var forgotRow=el('div',{style:{textAlign:'right',marginBottom:'24px'}});
  forgotRow.appendChild(el('button',{style:{fontSize:'13px',color:'#1B6B3A',fontWeight:'500'}},'Forgot password?'));
  scroll.appendChild(forgotRow);

  // Error msg
  var errMsg=el('div',{style:{background:'#FFF5F5',border:'1px solid #FFD5D5',borderRadius:'10px',padding:'12px 14px',marginBottom:'16px',display:'none'}});
  errMsg.appendChild(el('p',{style:{fontSize:'13px',color:'#E53E3E'}},'Invalid email or password. Try again.'));
  scroll.appendChild(errMsg);

  // Divider
  var divRow2=el('div',{style:{display:'flex',alignItems:'center',gap:'12px',margin:'4px 0 18px'}});
  divRow2.appendChild(el('div',{style:{flex:'1',height:'1px',background:'#EBEBEB'}}));
  divRow2.appendChild(el('span',{style:{fontSize:'12px',color:'#ABABAB'}},'or'));
  divRow2.appendChild(el('div',{style:{flex:'1',height:'1px',background:'#EBEBEB'}}));
  scroll.appendChild(divRow2);

  // Google
  var googleBtn2=el('button',{style:{width:'100%',padding:'14px',background:'#fff',border:'1.5px solid #EBEBEB',borderRadius:'14px',display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',fontSize:'14px',fontWeight:'500',color:'#111',cursor:'pointer',fontFamily:'inherit',marginBottom:'20px'}});
  googleBtn2.innerHTML='<svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>';
  googleBtn2.appendChild(document.createTextNode('Continue with Google'));
  googleBtn2.addEventListener('click',function(){onboardData.name='Alex Johnson';onboardData.school='Howard University';onboardData.skills=['Design','React','Figma'];onboardData.availability='collabs';go('home');});
  scroll.appendChild(googleBtn2);

  wrap.appendChild(scroll);

  var footer3=el('div',{style:{padding:'12px 24px 40px',flexShrink:'0'}});
  var loginBtn2=el('button',{style:{width:'100%',padding:'16px',background:'#111',color:'#fff',fontSize:'15px',fontWeight:'600',borderRadius:'14px',border:'none',cursor:'pointer',fontFamily:'inherit',marginBottom:'14px'}});
  loginBtn2.textContent='Log In';
  loginBtn2.addEventListener('click', async function(){
    if(!emailIn2.value||!passIn2.value){errMsg.style.display='block';return;}
    loginBtn2.textContent='Logging in...';
    loginBtn2.style.opacity='0.7';
    loginBtn2.disabled=true;
    try {
      var data = await supaLogIn(emailIn2.value, passIn2.value);
      if(data && data.user) {
        onboardData.userId = data.user.id;
        onboardData.email = data.user.email;
        var profile = await supaLoadProfile(data.user.id);
        if(profile) {
          onboardData.name = profile.name || '';
          onboardData.school = profile.school || '';
          onboardData.major = profile.major || '';
          onboardData.gradYear = profile.grad_year || '';
          onboardData.skills = profile.skills ? profile.skills.split(',').filter(Boolean) : [];
          onboardData.availability = profile.availability || '';
          onboardData.avatar = profile.avatar_url || null;
          onboardData.bio = profile.bio || '';
        }
        go('home');
      }
    } catch(e) {
      errMsg.style.display='block';
      errMsg.querySelector('p').textContent = e.message || 'Invalid email or password.';
      loginBtn2.textContent='Log In';
      loginBtn2.style.opacity='1';
      loginBtn2.disabled=false;
    }
  });
  footer3.appendChild(loginBtn2);
  footer3.appendChild(el('p',{style:{fontSize:'13px',color:'#8A8A8A',textAlign:'center'}},"Don't have an account? ",el('button',{style:{color:'#1B6B3A',fontWeight:'600',fontSize:'13px',cursor:'pointer'},onclick:function(){go('ob-account');}},'Sign Up')));
  wrap.appendChild(footer3);
  return wrap;
}

// ── MY POSTS SCREEN ───────────────────────────────────────────
function MyPostsScreen(){
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',height:'100%',background:'#F7F6F3'}});
  wrap.appendChild(StatusBar());

  var topBar=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 20px 14px',flexShrink:'0'}});
  var backBtn=el('button',{style:{width:'36px',height:'36px',display:'flex',alignItems:'center',justifyContent:'center'},onclick:function(){go('myprofile');}});
  backBtn.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
  topBar.appendChild(backBtn);
  topBar.appendChild(el('span',{style:{fontSize:'18px',fontWeight:'600',color:'#111'}},'My Posts'));
  var newPostBtn=el('button',{style:{fontSize:'13px',fontWeight:'600',color:'#fff',background:'#111',padding:'7px 16px',borderRadius:'100px',border:'none',cursor:'pointer',fontFamily:'inherit'},onclick:function(){go('create');}});
  newPostBtn.textContent='+ New';
  topBar.appendChild(newPostBtn);
  wrap.appendChild(topBar);

  var scroll=el('div',{class:'scroll',style:{padding:'0 16px 100px'}});
  wrap.appendChild(scroll);

  function renderList(posts) {
    scroll.innerHTML='';
    if(posts.length===0){
      var empty=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'60px 20px',textAlign:'center'}});
      empty.appendChild(el('div',{style:{fontSize:'52px',marginBottom:'16px'}},'🌿'));
      empty.appendChild(el('h3',{style:{fontSize:'20px',fontWeight:'600',color:'#111',marginBottom:'8px'}},'No posts yet'));
      empty.appendChild(el('p',{style:{fontSize:'14px',color:'#8A8A8A',lineHeight:'1.6',marginBottom:'28px',maxWidth:'240px'}},'Share your skills, drop a project, or post a collab idea.'));
      var fpBtn=el('button',{style:{padding:'14px 32px',background:'#111',color:'#fff',borderRadius:'14px',fontSize:'15px',fontWeight:'600',border:'none',cursor:'pointer',fontFamily:'inherit'},onclick:function(){go('create');}});
      fpBtn.textContent='Make Your First Post';
      empty.appendChild(fpBtn);
      scroll.appendChild(empty);
      return;
    }
    // Stats bar
    var statsBar=el('div',{style:{display:'flex',gap:'10px',marginBottom:'16px',paddingTop:'4px'}});
    [{v:posts.length,l:'Posts'},{v:posts.reduce(function(a,p){return a+(p.likes||0);},0),l:'Likes'},{v:posts.reduce(function(a,p){return a+(p.comments||0);},0),l:'Comments'}].forEach(function(s){
      var card=el('div',{style:{flex:'1',background:'#fff',borderRadius:'12px',padding:'12px',textAlign:'center',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}});
      card.appendChild(el('p',{style:{fontSize:'20px',fontWeight:'600',color:'#111'}},String(s.v)));
      card.appendChild(el('p',{style:{fontSize:'11px',color:'#8A8A8A',marginTop:'2px'}},s.l));
      statsBar.appendChild(card);
    });
    scroll.appendChild(statsBar);

    posts.forEach(function(post){
      var typeColors={skills:'#1B6B3A','My Skills':'#1B6B3A',project:'#0A5A8A','Project':'#0A5A8A',collab:'#7A3FC0','Collab':'#7A3FC0',event:'#B85C00','Event':'#B85C00'};
      var typeColor = typeColors[post.type]||typeColors[post.typeLabel]||'#111';
      var typeLabel = post.typeLabel||post.type||'Post';
      var card=el('div',{style:{background:'#fff',borderRadius:'14px',overflow:'hidden',boxShadow:'0 1px 8px rgba(0,0,0,.07)',marginBottom:'14px'}});
      var hdr2=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'14px 14px 10px'}});
      var avaDiv=el('div',{style:{width:'40px',height:'40px',borderRadius:'50%',overflow:'hidden',flexShrink:'0'}});
      avaDiv.appendChild(el('img',{src:post.avatar||myAva(),style:{width:'100%',height:'100%',objectFit:'cover'}}));
      hdr2.appendChild(avaDiv);
      var hInfo=el('div',{style:{flex:'1'}});
      hInfo.appendChild(el('p',{style:{fontSize:'14px',fontWeight:'600',color:'#111'}},post.name||myName()));
      hInfo.appendChild(el('p',{style:{fontSize:'12px',color:'#8A8A8A'}},(post.school||mySchool())+' · '+(post.time||'Recently')));
      hdr2.appendChild(hInfo);
      hdr2.appendChild(el('span',{style:{fontSize:'11px',fontWeight:'600',padding:'4px 10px',borderRadius:'100px',background:typeColor+'15',color:typeColor}},typeLabel));
      card.appendChild(hdr2);
      card.appendChild(el('div',{style:{height:'1px',background:'#F5F5F5',margin:'0 14px'}}));
      var acts=el('div',{style:{display:'flex',alignItems:'center',gap:'16px',padding:'12px 14px'}});
      var liked2={v:post.liked||false};
      var likeBtn2=el('button',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'13px',color:liked2.v?'#E53E3E':'#8A8A8A',fontWeight:'500',fontFamily:'inherit'}});
      function rl2(){likeBtn2.innerHTML='';likeBtn2.innerHTML='<svg viewBox="0 0 24 24" width="18" height="18" fill="'+(liked2.v?'#E53E3E':'none')+'" stroke="'+(liked2.v?'#E53E3E':'#8A8A8A')+'" stroke-width="1.8" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';likeBtn2.appendChild(document.createTextNode(' '+(post.likes||0)));}
      rl2();
      likeBtn2.addEventListener('click',function(){liked2.v=!liked2.v;post.liked=liked2.v;post.likes=(post.likes||0)+(liked2.v?1:-1);rl2();});
      acts.appendChild(likeBtn2);
      var cmtBtn2=el('button',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'13px',color:'#8A8A8A',fontWeight:'500',fontFamily:'inherit'}});
      cmtBtn2.innerHTML='<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#8A8A8A" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> '+(post.comments||0);
      acts.appendChild(cmtBtn2);
      acts.appendChild(el('div',{style:{flex:'1'}}));
      var delBtn=el('button',{style:{display:'flex',alignItems:'center',gap:'5px',fontSize:'12px',color:'#C0C0C0',fontWeight:'500',fontFamily:'inherit',padding:'4px 8px',borderRadius:'8px',border:'1px solid #EBEBEB',background:'#fff'}});
      delBtn.innerHTML='<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#C0C0C0" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg> Delete';
      delBtn.addEventListener('click', async function(){
        card.style.opacity='0'; card.style.transform='scale(.95)'; card.style.transition='all .2s';
        myPosts=myPosts.filter(function(p){return p.id!==post.id;});
        try { await supaDeletePost(post.id); } catch(e){ console.warn('delete:', e.message); }
        setTimeout(function(){if(card.parentNode)card.parentNode.removeChild(card);},200);
      });
      acts.appendChild(delBtn);
      card.appendChild(acts);
      scroll.appendChild(card);
    });
  }

  // Show local posts immediately, then sync from Supabase in background
  async function loadMyPosts() {
    // Step 1: Show whatever we have locally right away (never blank after posting)
    renderList(myPosts);

    // Step 2: Check session if userId missing
    if(!onboardData.userId) {
      try {
        var { data: sess } = await supa.auth.getSession();
        if(sess && sess.session) onboardData.userId = sess.session.user.id;
      } catch(e){}
    }

    // Step 3: Fetch from Supabase and merge (keep local-only posts too)
    try {
      if(onboardData.userId) {
        var rows = await supaFetchMyPosts(onboardData.userId);
        if(rows.length > 0) {
          // Merge: remote posts + any local-only ones not yet in DB
          var remoteIds = rows.map(function(r){ return r.id; });
          var localOnly = myPosts.filter(function(p){ return String(p.id).startsWith('local_'); });
          myPosts = rows.map(normalizePost).concat(localOnly);
          renderList(myPosts);
        }
      }
    } catch(e){ console.warn('loadMyPosts:', e.message); }
  }

  loadMyPosts();
  wrap.appendChild(BottomNav());
  return wrap;
}

// ── RENDER ────────────────────────────────────────────────────
var SCREENS={
  welcome:WelcomeScreen,
  login:LoginScreen,
  'ob-account':ObAccountScreen,
  'ob-identity':ObIdentityScreen,
  'ob-skills':ObSkillsScreen,
  'ob-availability':ObAvailabilityScreen,
  'ob-photo':ObPhotoScreen,
  'ob-preview':ObPreviewScreen,
  home:HomeScreen,explore:ExploreScreen,fullscreen:FullScreen,postdetail:PostDetail,
  myprofile:MyProfileScreen,
  profile:ProfileScreen,
  editprofile:EditProfileScreen,
  notifications:NotificationsScreen,
  settings:SettingsScreen,
  myposts:MyPostsScreen,
  create:CreateScreen,messages:MessagesScreen,chat:function(){return ChatScreen(state.post||CONVOS[0]);}
};
var SLIDE_DIR={
  welcome:'left',login:'right',
  'ob-account':'right','ob-identity':'right','ob-skills':'right','ob-availability':'right','ob-photo':'right','ob-preview':'right',
  home:'left',explore:'left',fullscreen:'right',postdetail:'right',
  myprofile:'right',profile:'right',editprofile:'right',notifications:'right',settings:'right',myposts:'right',
  create:'bottom',messages:'left',chat:'right'
};
var screenEls={};

function render(){
  var app=document.getElementById('app');
  if(!app._init){
    app._init=true;
    Object.keys(SCREENS).forEach(function(key){
      var div=el('div',{class:'screen hidden-'+(SLIDE_DIR[key]||'right')});
      screenEls[key]=div;
      app.appendChild(div);
    });
  }
  Object.keys(screenEls).forEach(function(key){
    var div=screenEls[key];
    var isActive=key===state.screen;
    if(isActive){
      div.innerHTML='';
      div.appendChild(SCREENS[key]());
      div.className='screen';
    } else {
      var d=SLIDE_DIR[key]||'right';
      div.className='screen hidden-'+(d==='right'?'right':d==='bottom'?'bottom':'left');
    }
  });
}

render();
// Auto-login returning users
supaCheckSession();
</script>
