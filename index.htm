<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Yard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#B0ADA6;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Sans',system-ui,sans-serif}
#app{width:390px;height:844px;background:#F7F6F3;border-radius:48px;overflow:hidden;position:relative;box-shadow:0 32px 80px rgba(0,0,0,.4),0 0 0 1px rgba(0,0,0,.1)}
.screen{position:absolute;inset:0;overflow:hidden;display:flex;flex-direction:column;background:#F7F6F3;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform}
.screen.hidden-right{transform:translateX(100%)}
.screen.hidden-left{transform:translateX(-100%)}
.screen.hidden-bottom{transform:translateY(100%)}
.scroll{overflow-y:auto;flex:1}
.scroll::-webkit-scrollbar{display:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{display:none}

/* STATUS BAR */
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 0;flex-shrink:0}
.status .time{font-size:15px;font-weight:600}

/* BOTTOM NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:1px solid #EBEBEB;display:flex;align-items:center;justify-content:space-around;padding:10px 0 24px;z-index:20}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#8A8A8A;font-weight:400}
.nav-btn.active{color:#1B6B3A;font-weight:600}
.nav-fab{width:48px;height:48px;background:#111;border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.22);margin-top:-4px}

/* CARDS */
.post-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:14px}
.post-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.tag{font-size:11px;font-weight:500;background:#EAF4EE;color:#1B6B3A;padding:3px 10px;border-radius:100px;display:inline-block}
.pill{padding:6px 16px;border-radius:100px;font-size:13px;font-weight:500;border:1.5px solid #EBEBEB;background:#fff;color:#8A8A8A;cursor:pointer;flex-shrink:0}
.pill.active{background:#111;color:#fff;border-color:#111}
.pill.green.active{background:#EAF4EE;color:#1B6B3A;border-color:#1B6B3A}

/* FORM ELEMENTS */
.field-label{font-size:12px;font-weight:600;color:#8A8A8A;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;display:block}
.field-input{width:100%;background:#fff;border:1.5px solid #EBEBEB;border-radius:12px;padding:13px 16px;font-size:14px;color:#111;display:block;transition:border-color .15s;resize:none;line-height:1.5}
.field-input:focus{border-color:#1B6B3A}
.field-input::placeholder{color:#C0C0C0}
.field-group{margin-bottom:20px}
.auto-field{background:#F7F6F3;border:1.5px solid #EBEBEB;border-radius:12px;padding:13px 16px;font-size:14px;color:#8A8A8A;display:flex;justify-content:space-between;align-items:center}
.skill-pill{padding:7px 16px;border-radius:100px;border:1.5px solid #EBEBEB;background:#fff;color:#6B6B6B;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.skill-pill.on{border-color:#1B6B3A;background:#EAF4EE;color:#1B6B3A}
.radio-btn{padding:8px 18px;border-radius:100px;border:1.5px solid #EBEBEB;background:#fff;color:#6B6B6B;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.radio-btn.on{border-color:#111;background:#111;color:#fff}
.divider-label{display:flex;align-items:center;gap:12px;margin:4px 0 20px}
.divider-label::before,.divider-label::after{content:'';flex:1;height:1px;background:#EBEBEB}
.divider-label span{font-size:11px;font-weight:600;color:#C0C0C0;text-transform:uppercase;letter-spacing:.8px}
.upload-box{width:100%;height:88px;border:1.5px dashed #DDD;border-radius:12px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.upload-label{font-size:13px;color:#C0C0C0;font-weight:500}
.type-card{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;background:#fff;border:1.5px solid #EBEBEB;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:all .18s;cursor:pointer;text-align:left;width:100%}
.type-card.active{border-width:2px}
.type-icon-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s}
.type-card-label{font-size:13px;font-weight:600;line-height:1.2}
.type-card-desc{font-size:11px;color:#ABABAB;margin-top:2px}

/* SHEETS & MODALS */
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .28s ease;pointer-events:none}
.sheet-backdrop.open{opacity:1;pointer-events:all}
.sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;padding:0 0 32px;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.sheet-backdrop.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#E0E0E0;border-radius:100px;margin:12px auto 16px}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:0 24px;opacity:0;transition:opacity .22s ease;pointer-events:none}
.modal-backdrop.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:20px;width:100%;transform:scale(.92);opacity:0;transition:transform .25s cubic-bezier(.4,0,.2,1),opacity .25s ease}
.modal-backdrop.open .modal{transform:scale(1);opacity:1}

/* MESSAGES */
.msg-row{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid #F2F2F2;cursor:pointer;transition:background .1s}
.msg-row:active{background:#F7F6F3}
.msg-ava{position:relative;flex-shrink:0}
.msg-ava img{width:48px;height:48px;border-radius:50%;object-fit:cover;display:block}
.msg-dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;background:#1B6B3A;border-radius:50%;border:2.5px solid #fff}
.msg-unread-badge{min-width:18px;height:18px;background:#1B6B3A;color:#fff;border-radius:100px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;padding:0 5px}
.chat-bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.45;margin-bottom:4px}
.chat-bubble.them{background:#fff;color:#111;border-bottom-left-radius:4px;align-self:flex-start;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.chat-bubble.me{background:#111;color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.chat-time{font-size:10px;color:#C0C0C0;margin-bottom:16px;text-align:center}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .22s ease forwards}
@keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .3s ease forwards}

/* FULLSCREEN */
.full-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.55) 40%,rgba(0,0,0,.1) 65%,transparent 100%)}
.glass-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.2);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.action-rail-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,.18);backdrop-filter:blur(12px);border-radius:100px;padding:10px;border:none;cursor:pointer}
.action-rail-btn span{font-size:11px;color:#fff}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── HELPERS ───────────────────────────────────────────────────
function el(tag, attrs, ...kids) {
  var e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(function([k, v]) {
    if (k === 'class') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  });
  kids.forEach(function(k) {
    if (k == null) return;
    if (typeof k === 'string') e.appendChild(document.createTextNode(k));
    else e.appendChild(k);
  });
  return e;
}
function svg(tag, attrs, html) {
  var e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  if (attrs) Object.entries(attrs).forEach(function([k, v]) { e.setAttribute(k, v); });
  if (html) e.innerHTML = html;
  return e;
}
function icon(paths, w, stroke) {
  var s = svg('svg', {viewBox:'0 0 24 24', width: w||22, height: w||22, fill:'none', stroke: stroke||'currentColor', 'stroke-width':'1.8', 'stroke-linecap':'round', 'stroke-linejoin':'round'});
  s.innerHTML = paths;
  return s;
}

// ── DATA ──────────────────────────────────────────────────────
var POSTS = [
  {id:1, img:'https://images.unsplash.com/photo-1588690154757-badf4644190f?w=800&q=80', avatar:'https://images.unsplash.com/photo-1727300805079-9c9ef920c75a?w=100&q=80', name:'Marcus J.', school:'Howard University', caption:'Built a full-stack inventory system for local HBCU businesses. Looking for a designer to help with the UI.', tags:['React','Node.js','PostgreSQL'], likes:142, comments:23, type:'Project'},
  {id:2, img:'https://images.unsplash.com/photo-1769206089384-bd1d9943345b?w=800&q=80', avatar:'https://images.unsplash.com/photo-1770235622269-bf3124d85032?w=100&q=80', name:'Aaliyah T.', school:'Spelman College', caption:'Rebranded three student orgs this semester. Specializing in brand identity for Black-owned businesses.', tags:['Branding','Figma','Typography'], likes:289, comments:47, type:'Skill'},
  {id:3, img:'https://images.unsplash.com/photo-1671129930758-5c978e578123?w=800&q=80', avatar:'https://images.unsplash.com/photo-1563233589-41b3764fc123?w=100&q=80', name:'DeShawn R.', school:'Morehouse College', caption:'Produced 4 tracks for campus artists this month. Looking to collab with vocalists and videographers.', tags:['Music Production','Pro Tools','FL Studio'], likes:198, comments:31, type:'Collab'},
  {id:4, img:'https://images.unsplash.com/photo-1769636930047-4478f12cf430?w=800&q=80', avatar:'https://images.unsplash.com/photo-1727300805079-9c9ef920c75a?w=100&q=80', name:'Jordan P.', school:'FAMU', caption:'Pitching at the HBCU Business Summit. Need a developer and a marketing lead to join the team.', tags:['Business','Pitch Deck','Startup'], likes:76, comments:14, type:'Event'},
];
var PEOPLE = [
  {name:'Jordan P.', school:'FAMU', role:'Full-Stack Dev', avatar:'https://images.unsplash.com/photo-1713946598467-fcf9332c56ea?w=100&q=80'},
  {name:'Simone K.', school:'Howard', role:'UX Designer', avatar:'https://images.unsplash.com/photo-1645736353780-e70a7d508088?w=100&q=80'},
  {name:'DeShawn R.', school:'Morehouse', role:'Music Producer', avatar:'https://images.unsplash.com/photo-1563233589-41b3764fc123?w=100&q=80'},
  {name:'Tia M.', school:'Spelman', role:'Researcher', avatar:'https://images.unsplash.com/photo-1770235622269-bf3124d85032?w=100&q=80'},
];
var TRENDING = [
  {tag:'#HBCU Tech', posts:'1.2k posts'},{tag:'#ColumbiaDesign', posts:'847 posts'},
  {tag:'#StartupSeason', posts:'2.1k posts'},{tag:'#MusicProducers', posts:'634 posts'},
  {tag:'#BlackEntrepreneurs', posts:'3.4k posts'},{tag:'#ResearchLife', posts:'412 posts'},
];
var EXPLORE_IMGS = [
  {img:'https://images.unsplash.com/photo-1588690154757-badf4644190f?w=400&q=80', type:'Project'},
  {img:'https://images.unsplash.com/photo-1620829813573-7c9e1877706f?w=400&q=80', type:'Skill'},
  {img:'https://images.unsplash.com/photo-1710799885122-428e63eff691?w=400&q=80', type:'Collab'},
  {img:'https://images.unsplash.com/photo-1613186941372-f19da23e373b?w=400&q=80', type:'Event'},
  {img:'https://images.unsplash.com/photo-1671129930758-5c978e578123?w=400&q=80', type:'Skill'},
  {img:'https://images.unsplash.com/photo-1634041695335-ee19a4155abd?w=400&q=80', type:'Project'},
  {img:'https://images.unsplash.com/photo-1653566031489-78ae0fa0872c?w=400&q=80', type:'Collab'},
  {img:'https://images.unsplash.com/photo-1769636930047-4478f12cf430?w=400&q=80', type:'Event'},
  {img:'https://images.unsplash.com/photo-1542623173215-4fe2adeec903?w=400&q=80', type:'Skill'},
];
var PORTFOLIO = [
  'https://images.unsplash.com/photo-1588690154757-badf4644190f?w=300&q=80',
  'https://images.unsplash.com/photo-1769206089384-bd1d9943345b?w=300&q=80',
  'https://images.unsplash.com/photo-1671129930758-5c978e578123?w=300&q=80',
  'https://images.unsplash.com/photo-1769636930047-4478f12cf430?w=300&q=80',
  'https://images.unsplash.com/photo-1620233383573-b51d099bb075?w=300&q=80',
  'https://images.unsplash.com/photo-1727300805079-9c9ef920c75a?w=300&q=80',
];
var SKILLS = ['Design','React','Figma','Branding','Marketing','Writing','Music','Video','Python','Finance','Photography','Research','iOS Dev','Node.js','3D Motion','Business'];
var MY_AVA = 'https://images.unsplash.com/photo-1620233383573-b51d099bb075?w=100&q=80';
var C_TYPES = [
  {key:'skills', label:'My Skills', desc:'Showcase your talent', color:'#1B6B3A', bg:'#EAF4EE'},
  {key:'project', label:'Project', desc:'Build with others', color:'#0A5A8A', bg:'#E8F3FA'},
  {key:'collab', label:'Collab', desc:'Open collaboration', color:'#7A3FC0', bg:'#F2EBF9'},
  {key:'event', label:'Event', desc:'Promote a gathering', color:'#B85C00', bg:'#FDF0E6'},
];

// ── ROUTER ────────────────────────────────────────────────────
var state = { screen: 'home', nav: 'home', post: null };

function go(screen, post) {
  if (post) state.post = post;
  if (screen === 'home' || screen === 'explore') state.nav = screen;
  state.screen = screen;
  render();
}

// ── STATUS BAR ────────────────────────────────────────────────
function StatusBar(light) {
  var c = light ? '#fff' : '#111';
  return el('div', {class:'status'},
    el('span', {class:'time', style:{color:c}}, '9:41'),
    el('div', {style:{display:'flex',gap:'5px',alignItems:'center'}},
      el('svg', {viewBox:'0 0 15 11', width:'15', height:'11', style:{display:'block'}},
        ...[{x:0,y:5,h:6},{x:3.5,y:3,h:8},{x:7,y:1,h:10},{x:10.5,y:0,h:11}].map(function(r){
          var rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
          rect.setAttribute('x',r.x); rect.setAttribute('y',r.y);
          rect.setAttribute('width','2.5'); rect.setAttribute('height',r.h);
          rect.setAttribute('rx','.5'); rect.setAttribute('fill',c);
          return rect;
        })
      ),
      (function(){
        var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
        s.setAttribute('viewBox','0 0 22 11'); s.setAttribute('width','22'); s.setAttribute('height','11');
        s.innerHTML = '<rect x=".5" y=".5" width="18" height="10" rx="2" stroke="'+c+'" stroke-width="1" fill="none"/><rect x="2" y="2" width="11" height="7" rx="1" fill="'+c+'"/><path d="M20 3.5v4" stroke="'+c+'" stroke-width="1.5" stroke-linecap="round"/>';
        return s;
      })()
    )
  );
}

// ── BOTTOM NAV ────────────────────────────────────────────────
function BottomNav() {
  var items = [
    {key:'home', label:'Home', paths:'<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'},
    {key:'explore', label:'Explore', paths:'<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>'},
    null,
    {key:'messages', label:'Messages', paths:'<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/>'},
    {key:'me', label:'Me', paths:'<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>'},
  ];
  var nav = el('div', {class:'bottom-nav'});
  items.forEach(function(item) {
    if (!item) {
      var fab = el('button', {class:'nav-fab', onclick:function(){go('create');}});
      fab.innerHTML = '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
      nav.appendChild(fab);
      return;
    }
    var active = state.nav === item.key;
    var c = active ? '#1B6B3A' : '#8A8A8A';
    var btn = el('button', {class:'nav-btn'+(active?' active':''), onclick:function(){
      if(item.key==='home') go('home');
      else if(item.key==='explore') go('explore');
      else if(item.key==='messages') go('messages');
      else if(item.key==='me') go('profile');
    }});
    var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('width','22'); s.setAttribute('height','22');
    s.setAttribute('fill','none'); s.setAttribute('stroke',c);
    s.setAttribute('stroke-width','1.8'); s.setAttribute('stroke-linecap','round'); s.setAttribute('stroke-linejoin','round');
    s.innerHTML = item.paths;
    btn.appendChild(s);
    btn.appendChild(document.createTextNode(item.label));
    nav.appendChild(btn);
  });
  return nav;
}

// ── HOME SCREEN ───────────────────────────────────────────────
function HomeScreen() {
  var wrap = el('div', {style:{display:'flex',flexDirection:'column',height:'100%'}});

  wrap.appendChild(StatusBar());

  // Header
  var hdr = el('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 20px 8px'}});
  hdr.appendChild(el('span', {style:{fontSize:'24px',fontWeight:'600',color:'#111',letterSpacing:'-.5px'}}, 'The Yard'));
  var hdrR = el('div', {style:{display:'flex',alignItems:'center',gap:'10px'}});
  var searchBtn = el('button', {style:{width:'36px',height:'36px',display:'flex',alignItems:'center',justifyContent:'center'}});
  searchBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#8A8A8A" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>';
  var avaBtn = el('button', {style:{width:'34px',height:'34px',borderRadius:'50%',overflow:'hidden',border:'2px solid #1B6B3A',flexShrink:'0'}, onclick:function(){go('profile');}});
  avaBtn.appendChild(el('img', {src:MY_AVA, style:{width:'100%',height:'100%',objectFit:'cover'}}));
  hdrR.appendChild(searchBtn); hdrR.appendChild(avaBtn);
  hdr.appendChild(hdrR);
  wrap.appendChild(hdr);

  // Filters row 1
  var f1 = el('div', {style:{display:'flex',gap:'8px',padding:'0 20px 8px',overflowX:'auto'}});
  ['For You','Nearby','My School','All Schools'].forEach(function(f,i) {
    var b = el('button', {class:'pill'+(i===0?' active':''), onclick:function(){
      f1.querySelectorAll('.pill').forEach(function(x){x.className='pill';});
      b.className='pill active';
    }}, f);
    f1.appendChild(b);
  });
  wrap.appendChild(f1);

  // Filters row 2
  var f2 = el('div', {style:{display:'flex',gap:'8px',padding:'0 20px 12px',overflowX:'auto'}});
  ['All','Tech','Design','Business','Music','Research','Events'].forEach(function(f,i) {
    var b = el('button', {class:'pill green'+(i===0?' active':''), onclick:function(){
      f2.querySelectorAll('.pill').forEach(function(x){x.className='pill green';});
      b.className='pill green active';
    }}, f);
    f2.appendChild(b);
  });
  wrap.appendChild(f2);

  // Feed
  var feed = el('div', {class:'scroll', style:{padding:'0 16px 100px'}});
  POSTS.forEach(function(post) {
    var card = el('div', {class:'post-card'});

    // Image
    var imgWrap = el('div', {style:{position:'relative'}});
    var img = el('img', {src:post.img, class:'post-img', loading:'lazy'});
    img.addEventListener('click', function(){go('postdetail', post);});
    imgWrap.appendChild(img);
    var fullBtn = el('button', {style:{position:'absolute',top:'8px',right:'8px',padding:'4px 10px',borderRadius:'100px',background:'rgba(0,0,0,.45)',backdropFilter:'blur(6px)',color:'#fff',fontSize:'10px',fontWeight:'500'}, onclick:function(){go('fullscreen', post);}}, 'Full View');
    imgWrap.appendChild(fullBtn);
    card.appendChild(imgWrap);

    // Body
    var body = el('div', {style:{padding:'14px 16px'}});

    // Author row
    var author = el('div', {style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}});
    author.appendChild(el('img', {src:post.avatar, style:{width:'28px',height:'28px',borderRadius:'50%',objectFit:'cover'}}));
    author.appendChild(el('span', {style:{fontSize:'13px',fontWeight:'500',color:'#111'}}, post.name));
    author.appendChild(el('span', {style:{fontSize:'12px',color:'#8A8A8A'}}, ' · '+post.school));

    var d=el('div',{class:'fade-up'});

      d.appendChild(divLine('Talent Post'));
      d.appendChild(fg('Title',makeInput('"Graphic Designer Open for Paid Work"')));
      d.appendChild(fg('Bio / About You',makeInput("Describe what you do and the work you're looking for...",true,3)));

      d.appendChild(fg('Skills That Would Help',skillPills()));

      d.appendChild(fg('Inspiration Images',uploadBox('Mood boards, references, anything that captures the vibe')));

// ── GLOBAL OVERLAY HELPERS ────────────────────────────────────
var activeOverlay = null;
function closeOverlay(){
  if(activeOverlay){ activeOverlay.classList.remove('open'); setTimeout(function(){if(activeOverlay&&activeOverlay.parentNode)activeOverlay.parentNode.removeChild(activeOverlay);activeOverlay=null;},320); }
}
function openOverlay(node){
  closeOverlay();
  var app=document.getElementById('app');
  app.appendChild(node);
  activeOverlay=node;
  setTimeout(function(){node.classList.add('open');},10);
}

// ── SHARE SHEET ───────────────────────────────────────────────

  var backdrop=el('div',{class:'sheet-backdrop'});

  var sheet=el('div',{class:'sheet'});
  sheet.appendChild(el('div',{class:'sheet-handle'}));
  var title=el('p',{style:{fontSize:'16px',fontWeight:'600',color:'#111',textAlign:'center',marginBottom:'6px',paddingTop:'4px'}},name?'Share '+name+"'s Profile":'Share Profile');
  sheet.appendChild(title);
  sheet.appendChild(el('p',{style:{fontSize:'13px',color:'#8A8A8A',textAlign:'center',marginBottom:'20px',padding:'0 20px'}},'Let others know about this person on The Yard'));

  // Share options grid
  var opts=[
    {icon:'📋',label:'Copy Link'},
    {icon:'💬',label:'Send Message'},
    {icon:'📸',label:'Instagram'},
    {icon:'🐦',label:'X / Twitter'},
    {icon:'💼',label:'LinkedIn'},
    {icon:'📧',label:'Email'},
  ];
  var grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',padding:'0 20px 20px'}});

      else closeOverlay();

  modal.appendChild(el('h3',{style:{fontSize:'18px',fontWeight:'600',color:'#111',marginBottom:'4px'}},name||'Connect'));
  modal.appendChild(el('p',{style:{fontSize:'13px',color:'#8A8A8A',marginBottom:'4px'}},role||'Student'));
  modal.appendChild(el('p',{style:{fontSize:'12px',color:'#ABABAB',marginBottom:'16px'}},school||'HBCU'));

  var divLine=el('div',{style:{height:'1px',background:'#EBEBEB',margin:'0 0 16px'}});
  modal.appendChild(divLine);

  modal.appendChild(el('p',{style:{fontSize:'13px',color:'#555',lineHeight:'1.6',marginBottom:'20px'}},'Send a connect request to '+( name||'this person')+'.\nThey\'ll be notified and can message you back.'));

  // Note input
  var noteWrap=el('div',{style:{marginBottom:'20px',textAlign:'left'}});
  noteWrap.appendChild(el('span',{style:{fontSize:'12px',fontWeight:'600',color:'#8A8A8A',textTransform:'uppercase',letterSpacing:'.7px',marginBottom:'8px',display:'block'}},'Add a note (optional)'));
  var noteIn=el('textarea',{class:'field-input',placeholder:'Hey! I saw your work and would love to connect...',rows:'3',style:{resize:'none'}});
  noteWrap.appendChild(noteIn);
  modal.appendChild(noteWrap);

  var connected=false;
  var connectBtn=el('button',{style:{width:'100%',padding:'15px',background:'#111',color:'#fff',fontSize:'15px',fontWeight:'600',borderRadius:'14px',border:'none',cursor:'pointer',marginBottom:'10px',transition:'all .2s'}});
  connectBtn.textContent='Send Connect Request';
  connectBtn.addEventListener('click',function(){
    if(!connected){
      connected=true;
      connectBtn.textContent='✓ Request Sent';
      connectBtn.style.background='#1B6B3A';
      setTimeout(function(){closeOverlay();},1200);
    }
  });
  modal.appendChild(connectBtn);

  var cancelBtn=el('button',{style:{width:'100%',padding:'12px',fontSize:'14px',fontWeight:'500',color:'#8A8A8A',cursor:'pointer'},onclick:closeOverlay},'Maybe Later');
  modal.appendChild(cancelBtn);

  backdrop.appendChild(modal);
  openOverlay(backdrop);
}

function ChatScreen(convo){
  var messages=(CHAT_MESSAGES[convo.id]||[]).slice();
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',height:'100%',background:'#F7F6F3'}});
  wrap.appendChild(StatusBar());

  // Header
  var hdr=el('div',{style:{display:'flex',alignItems:'center',gap:'12px',padding:'10px 16px 12px',background:'#fff',borderBottom:'1px solid #EBEBEB',flexShrink:'0'}});
  var backBtn=el('button',{style:{width:'36px',height:'36px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'},onclick:function(){go('messages');}});
  backBtn.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>';
  hdr.appendChild(backBtn);
  var avaWrap2=el('div',{style:{position:'relative',flexShrink:'0'}});
  avaWrap2.appendChild(el('img',{src:convo.avatar,style:{width:'38px',height:'38px',borderRadius:'50%',objectFit:'cover',display:'block'}}));
  if(convo.online){var dot=el('div',{style:{position:'absolute',bottom:'1px',right:'1px',width:'10px',height:'10px',background:'#1B6B3A',borderRadius:'50%',border:'2px solid #fff'}});avaWrap2.appendChild(dot);}
  hdr.appendChild(avaWrap2);
  var hInfo=el('div',{style:{flex:'1'}});
  hInfo.appendChild(el('p',{style:{fontSize:'15px',fontWeight:'600',color:'#111'}},convo.name));
  hInfo.appendChild(el('p',{style:{fontSize:'12px',color:convo.online?'#1B6B3A':'#8A8A8A'}},convo.online?'Active now':convo.school));
  hdr.appendChild(hInfo);
  var moreBtn=el('button',{style:{width:'36px',height:'36px',display:'flex',alignItems:'center',justifyContent:'center'}});
  moreBtn.innerHTML='<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1" fill="#111"/><circle cx="12" cy="12" r="1" fill="#111"/><circle cx="12" cy="19" r="1" fill="#111"/></svg>';
  hdr.appendChild(moreBtn);
  wrap.appendChild(hdr);

  // Messages
  var msgArea=el('div',{class:'scroll',style:{padding:'16px',display:'flex',flexDirection:'column',gap:'2px',paddingBottom:'90px'}});

  function renderMessages(){
    msgArea.innerHTML='';
    var lastTime='';
    messages.forEach(function(m){
      if(m.time&&m.time!==lastTime){
        lastTime=m.time;
        msgArea.appendChild(el('p',{class:'chat-time'},m.time));
      }
      var row=el('div',{style:{display:'flex',alignItems:'flex-end',gap:'8px',marginBottom:'2px',justifyContent:m.me?'flex-end':'flex-start'}});
      if(!m.me){
        row.appendChild(el('img',{src:convo.avatar,style:{width:'26px',height:'26px',borderRadius:'50%',objectFit:'cover',flexShrink:'0',marginBottom:'2px'}}));
      }
      row.appendChild(el('div',{class:'chat-bubble '+(m.me?'me':'them')},m.text));
      msgArea.appendChild(row);
    });
    msgArea.scrollTop=msgArea.scrollHeight;
  }
  renderMessages();
  wrap.appendChild(msgArea);

  // Input bar
  var inputBar=el('div',{style:{position:'absolute',bottom:'0',left:'0',right:'0',padding:'10px 16px 24px',background:'#fff',borderTop:'1px solid #EBEBEB'}});
  var inputRow=el('div',{style:{display:'flex',alignItems:'center',gap:'10px'}});
  var attachBtn=el('button',{style:{width:'36px',height:'36px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0'}});
  attachBtn.innerHTML='<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#8A8A8A" stroke-width="1.8" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>';
  inputRow.appendChild(attachBtn);
  var inputWrap2=el('div',{style:{flex:'1',display:'flex',alignItems:'center',background:'#F7F6F3',border:'1.5px solid #EBEBEB',borderRadius:'100px',padding:'0 14px',height:'42px'}});
  var chatIn=el('input',{placeholder:'Message '+convo.name.split(' ')[0]+'...',style:{flex:'1',background:'transparent',border:'none',outline:'none',fontSize:'14px',color:'#111'}});
  var sendBtn2=el('button',{style:{display:'none',width:'28px',height:'28px',background:'#111',borderRadius:'50%',alignItems:'center',justifyContent:'center',flexShrink:'0',marginRight:'-4px'}});
  sendBtn2.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="#fff" stroke="none"><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>';
  chatIn.addEventListener('input',function(){sendBtn2.style.display=chatIn.value.trim()?'flex':'none';});
  function sendMsg(){
    var txt=chatIn.value.trim();
    if(!txt)return;
    messages.push({me:true,text:txt,time:null});
    chatIn.value='';sendBtn2.style.display='none';
    renderMessages();
    // Auto-reply
    setTimeout(function(){
      var replies=["That's great! 🙌","Love that idea","Let's make it happen 💪","Send me the details","I'm in! 🔥"];
      messages.push({me:false,text:replies[Math.floor(Math.random()*replies.length)],time:null});
      renderMessages();
    },1200);
  }
  sendBtn2.addEventListener('click',sendMsg);
  chatIn.addEventListener('keydown',function(e){if(e.key==='Enter')sendMsg();});
  inputWrap2.appendChild(chatIn);inputWrap2.appendChild(sendBtn2);
  inputRow.appendChild(inputWrap2);
  var emojiBtn=el('button',{style:{width:'36px',height:'36px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:'0',fontSize:'20px'}});
  emojiBtn.textContent='😊';
  inputRow.appendChild(emojiBtn);
  inputBar.appendChild(inputRow);
  wrap.appendChild(inputBar);
  return wrap;
}

function MessagesScreen(){
  var wrap=el('div',{style:{display:'flex',flexDirection:'column',height:'100%'}});
  wrap.appendChild(StatusBar());

  var hdr=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 20px 14px'}});

  srch.innerHTML='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#8A8A8A" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>';

  // Request banner
  var reqBanner=el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#EAF4EE',margin:'0 20px 14px',padding:'12px 16px',borderRadius:'12px'}});
  reqBanner.appendChild(el('div',null,
    el('p',{style:{fontSize:'13px',fontWeight:'600',color:'#1B6B3A'}},'3 Connect Requests'),
    el('p',{style:{fontSize:'11px',color:'#5A9A72'}},'From Tia M., Devon K. and 1 more')
  ));
  var seeReq=el('button',{style:{fontSize:'12px',fontWeight:'600',color:'#1B6B3A',background:'#fff',padding:'6px 14px',borderRadius:'100px',border:'1.5px solid #1B6B3A'}},'See all');
  reqBanner.appendChild(seeReq);
  wrap.appendChild(reqBanner);

  // List
  var list=el('div',{class:'scroll',style:{paddingBottom:'90px'}});
  CONVOS.forEach(function(c){
    var row=el('div',{class:'msg-row',onclick:function(){go('chat',c);}});
    var avaDiv=el('div',{class:'msg-ava'});
    avaDiv.appendChild(el('img',{src:c.avatar,loading:'lazy'}));
    if(c.online) avaDiv.appendChild(el('div',{class:'msg-dot'}));
    row.appendChild(avaDiv);
    var body=el('div',{style:{flex:'1',minWidth:'0'}});
    var topRow=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'3px'}});
    topRow.appendChild(el('p',{style:{fontSize:'14px',fontWeight:c.unread?'600':'500',color:'#111'}},c.name));
    topRow.appendChild(el('span',{style:{fontSize:'11px',color:c.unread?'#1B6B3A':'#ABABAB',fontWeight:c.unread?'600':'400'}},c.time));
    body.appendChild(topRow);
    var botRow=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}});
    var prev=el('p',{style:{fontSize:'13px',color:c.unread?'#111':'#8A8A8A',fontWeight:c.unread?'500':'400',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',maxWidth:'220px'}},c.preview);
    botRow.appendChild(prev);
    if(c.unread>0) botRow.appendChild(el('span',{class:'msg-unread-badge'},String(c.unread)));
    body.appendChild(botRow);
    row.appendChild(body);
    list.appendChild(row);
  });
  wrap.appendChild(list);
  wrap.appendChild(BottomNav());
  return wrap;
}

// ── RENDER ────────────────────────────────────────────────────
var SCREENS={home:HomeScreen,explore:ExploreScreen,fullscreen:FullScreen,postdetail:PostDetail,profile:ProfileScreen,create:CreateScreen,messages:MessagesScreen,chat:function(){return ChatScreen(state.post||CONVOS[0]);}};
var SLIDE_DIR={home:'left',explore:'left',fullscreen:'right',postdetail:'right',profile:'right',create:'bottom',messages:'left',chat:'right'};
var screenEls={};

function render(){
  var app=document.getElementById('app');
  if(!app._init){
    app._init=true;
    Object.keys(SCREENS).forEach(function(key){
      var div=el('div',{class:'screen hidden-'+(SLIDE_DIR[key]||'right')});
      screenEls[key]=div;
      app.appendChild(div);
    });
  }
  Object.keys(screenEls).forEach(function(key){
    var div=screenEls[key];
    var isActive=key===state.screen;
    if(isActive){
      div.innerHTML='';
      div.appendChild(SCREENS[key]());
      div.className='screen';
    } else {
      var d=SLIDE_DIR[key]||'right';
      div.className='screen hidden-'+(d==='right'?'right':d==='bottom'?'bottom':'left');
    }
  });
}

render();
